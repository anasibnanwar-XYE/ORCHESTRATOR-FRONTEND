commands:
  install: bun install
  typecheck: bun run typecheck
  build: bun run build
  test: bun run test
  lint: bun run lint
  test:e2e: . "/Users/anas/Documents/New project 5/orchestrator-frontend/.env.validation.local" && bun run test:e2e

services:
  backend:
    start: . "/Users/anas/Documents/New project 5/orchestrator-frontend/.env.validation.local" && ERP_VALIDATION_SEED_PASSWORD="$VALIDATION_SHARED_PASSWORD" ERP_SEED_MOCK_ADMIN_PASSWORD="$VALIDATION_SHARED_PASSWORD" bash "/Users/anas/Documents/FACTORY/bigbrightpaints-erp/scripts/reset_final_validation_runtime.sh"
    stop: docker rm -f erp_domain_app erp_db erp_rabbit erp_mailhog >/dev/null 2>&1 || true
    healthcheck: sh -c 'status=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8081/api/v1/auth/me); [ "$status" = "401" ] || [ "$status" = "403" ]'
    port: 8081
    depends_on: []

  frontend:
    start: bunx vite --port 3002 --host 127.0.0.1
    stop: sh -c 'pids=$(lsof -ti :3002); [ -z "$pids" ] || kill $pids'
    healthcheck: curl -sf http://127.0.0.1:3002 >/dev/null
    port: 3002
    depends_on: [backend]
