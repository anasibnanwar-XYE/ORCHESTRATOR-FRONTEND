commands:
  install: bun install
  typecheck: bun run typecheck
  lint: bun run lint
  test: bun run test -- --maxWorkers=4
  build: bun run build

services:
  backend-remote:
    start: echo "External backend is user-managed via ssh asus-tuf-tail-ip; do not start from this repo."
    stop: echo "External backend is user-managed via ssh asus-tuf-tail-ip; do not stop from this repo."
    healthcheck: test "$(curl -s -o /dev/null -w '%{http_code}' http://100.109.241.47:8081/api/v1/auth/me)" = "403"
    port: 8081
    depends_on: []

  backend-actuator:
    start: echo "External actuator is user-managed via ssh asus-tuf-tail-ip; diagnostics only."
    stop: echo "External actuator is user-managed via ssh asus-tuf-tail-ip; do not stop from this repo."
    healthcheck: ssh -o BatchMode=yes -o ConnectTimeout=8 asus-tuf-tail-ip 'curl -sf http://127.0.0.1:9090/actuator/health/liveness >/dev/null'
    port: 9090
    depends_on: []

  web:
    start: bun run dev
    stop: lsof -ti :3002 | xargs kill
    healthcheck: curl -sf http://127.0.0.1:3002/login >/dev/null
    port: 3002
    depends_on: [backend-remote]
